<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library Management System</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 30px; background: #f0f4f8; }
    h1 { margin-bottom: 20px; }
    input { padding: 8px; margin-right: 6px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; color: white; }
    .btn-add    { background: #2563eb; }
    .btn-borrow { background: #d97706; }
    .btn-return { background: #16a34a; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th { background: #334155; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    .msg { margin-top: 10px; padding: 8px; border-radius: 4px; }
    .ok  { background: #dcfce7; color: #166534; }
    .err { background: #fee2e2; color: #991b1b; }
    h3 { margin-top: 20px; }
    ul { margin-top: 8px; padding-left: 20px; }
  </style>
</head>
<body>

<h1>Library Management System</h1>

<div>
  <input id="title"  type="text" placeholder="Book Title" />
  <input id="author" type="text" placeholder="Author" />
  <input id="year"   type="number" placeholder="Year" />
  <button class="btn-add" onclick="addBook()">Add Book</button>
  <div id="msg" class="msg" style="display:none"></div>
</div>

<div style="margin-top: 16px;">
  <input id="borrowTitle" type="text" placeholder="Title to borrow" />
  <button class="btn-borrow" onclick="borrowBook()">Borrow</button>
  <input id="returnTitle" type="text" placeholder="Title to return" />
  <button class="btn-return" onclick="returnBook()">Return</button>
  <div id="actionMsg" class="msg" style="display:none"></div>
</div>

<table>
  <thead>
    <tr><th>Title</th><th>Author</th><th>Year</th><th>Status</th></tr>
  </thead>
  <tbody id="bookTable"></tbody>
</table>

<h3>Available Books</h3>
<ul id="availableList"></ul>

<script>
  class Book {
    constructor(title, author, year) {
      this.title = title;
      this.author = author;
      this.year = year;
      this.available = true;
    }
  }

  class Library {
    constructor() {
      this.books = [];
    }

    addBook(book) {
      this.books.push(book);
    }

    borrowBook(title) {
      const book = this.books.find(b => b.title.toLowerCase() === title.toLowerCase());
      if (!book) return { ok: false, msg: "Book not found." };
      if (!book.available) return { ok: false, msg: "Book is already borrowed." };
      book.available = false;
      return { ok: true, msg: book.title + " has been borrowed." };
    }

    returnBook(title) {
      const book = this.books.find(b => b.title.toLowerCase() === title.toLowerCase());
      if (!book) return { ok: false, msg: "Book not found." };
      if (book.available) return { ok: false, msg: "This book was not borrowed." };
      book.available = true;
      return { ok: true, msg: book.title + " has been returned." };
    }

    listAvailable() {
      return this.books.filter(b => b.available);
    }
  }

  const library = new Library();
  library.addBook(new Book("Clean Code", "Robert Martin", 2008));
  library.addBook(new Book("Eloquent JavaScript", "Marijn Haverbeke", 2018));
  library.addBook(new Book("You Don't Know JS", "Kyle Simpson", 2015));

  function render() {
    const tbody = document.getElementById("bookTable");
    tbody.innerHTML = library.books.map(b => `
      <tr>
        <td>${b.title}</td>
        <td>${b.author}</td>
        <td>${b.year}</td>
        <td>${b.available ? "Available" : "Borrowed"}</td>
      </tr>
    `).join("");

    const ul = document.getElementById("availableList");
    const available = library.listAvailable();
    ul.innerHTML = available.length
      ? available.map(b => `<li>${b.title} by ${b.author}</li>`).join("")
      : "<li>No available books.</li>";
  }

  function showMsg(id, text, ok) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = "msg " + (ok ? "ok" : "err");
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
  }

  function addBook() {
    const title  = document.getElementById("title").value.trim();
    const author = document.getElementById("author").value.trim();
    const year   = document.getElementById("year").value.trim();
    if (!title || !author || !year) return showMsg("msg", "Fill in all fields.", false);
    library.addBook(new Book(title, author, parseInt(year)));
    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
    document.getElementById("year").value = "";
    showMsg("msg", title + " added.", true);
    render();
  }

  function borrowBook() {
    const title = document.getElementById("borrowTitle").value.trim();
    const result = library.borrowBook(title);
    document.getElementById("borrowTitle").value = "";
    showMsg("actionMsg", result.msg, result.ok);
    render();
  }

  function returnBook() {
    const title = document.getElementById("returnTitle").value.trim();
    const result = library.returnBook(title);
    document.getElementById("returnTitle").value = "";
    showMsg("actionMsg", result.msg, result.ok);
    render();
  }

  render();
</script>

</body>
</html>
